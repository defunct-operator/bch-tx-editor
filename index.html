<!DOCTYPE html>
<html>
    <head>
        <link data-trunk rel="inline" type="module" href="js-reexport/dist/reexports.js"/>
        <link data-trunk rel="tailwind-css" href="src/tailwind.css"/>
        <link data-trunk rel="rust" data-wasm-opt="s"/>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>bch-tx-editor</title>
        <style>
            .panel {
                position: relative;
            }
            .panel::before,
            .panel::after {
                position: absolute;
                left: 0;
                width: 100%;
                height: 4px;
                background-color: #0ea5e9;
                border-radius: 8px;
            }
            .panel::before {
                top: -7px;
            }
            .panel::after {
                bottom: -7px;
            }
            .panel--above::before {
                content: '';
            }
            .panel--below::after {
                content: '';
            }
        </style>
    </head>
    <body class="bg-stone-900 text-stone-300 p-1"</body>
</html>
